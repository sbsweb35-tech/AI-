<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 실무 활용 16일 마스터 로드맵</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; }
        .chart-container {
            position: relative;
            width: 100%;
            max-width: 700px;
            margin: auto;
            height: 280px;
        }
        .day-card { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            cursor: pointer; 
        }
        .day-card:hover { transform: translateX(4px); border-color: #0d9488; }
        .day-card.selected { border-color: #0d9488; background-color: #f0fdfa; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        
        .active-tab {
            background-color: #0d9488 !important;
            color: white !important;
            border-color: #0d9488 !important;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-stone-50 text-stone-800 antialiased selection:bg-teal-100">

<!-- Chosen Palette: Sand & Teal (bg-stone-50, teal-700, white) -->
<!-- Application Structure Plan: Refactored the card layout to a horizontal split. Left side contains course info, right side contains the memo feature. Removed password auth for direct interaction. Added an 'Edit' button for better accessibility. The right-side detail panel provides deep-dive content. -->
<!-- Visualization & Content Choices: 1. Horizontal Cards -> Organize -> Split layout -> HTML Flexbox. 2. Side Memo -> Interaction -> Inline editing without modal -> Vanilla JS state management. 3. Growth Tracking -> Analytics -> Line Chart -> Chart.js. -->
<!-- CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. -->

    <nav class="bg-white/80 backdrop-blur-md border-b border-stone-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="font-bold text-xl text-teal-800 flex items-center">
                    <span class="mr-2">🚀</span> AI 16-Day Roadmap
                </div>
                <div class="hidden md:flex items-center space-x-6">
                    <button onclick="scrollToSection('explorer')" class="text-sm font-medium text-stone-500 hover:text-teal-700">커리큘럼</button>
                    <button onclick="scrollToSection('analytics')" class="text-sm font-medium text-stone-500 hover:text-teal-700">성장분석</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <header class="mb-10 fade-in">
            <div class="bg-gradient-to-r from-teal-800 to-teal-700 rounded-3xl p-8 md:p-12 shadow-xl text-white">
                <div class="max-w-3xl">
                    <h1 class="text-3xl md:text-4xl font-bold mb-4 tracking-tight">AI 실무 마스터링 커리큘럼</h1>
                    <p class="text-teal-50 leading-relaxed text-lg mb-0 opacity-90">
                        16일간의 집중 학습을 통해 AI 전문가로 거듭나세요. <br class="hidden md:block">
                        각 카드 우측의 <strong>메모 섹션</strong>에 본인만의 학습 전략을 자유롭게 기록할 수 있습니다.
                    </p>
                </div>
            </div>
        </header>

        <section id="explorer" class="mb-12 scroll-mt-24">
            <div class="flex flex-col xl:flex-row gap-8">
                <!-- Main Card List -->
                <div class="xl:w-2/3">
                    <div class="mb-6 flex space-x-2 bg-white p-1 rounded-xl shadow-sm border border-stone-200">
                        <button onclick="filterPhase('all')" id="btn-all" class="phase-btn flex-1 py-2 text-xs font-bold rounded-lg transition-all active-tab">전체보기</button>
                        <button onclick="filterPhase('found')" id="btn-found" class="phase-btn flex-1 py-2 text-xs font-bold rounded-lg transition-all text-stone-500 hover:bg-stone-50">기초과정</button>
                        <button onclick="filterPhase('crea')" id="btn-crea" class="phase-btn flex-1 py-2 text-xs font-bold rounded-lg transition-all text-stone-500 hover:bg-stone-50">창작/멀티모달</button>
                        <button onclick="filterPhase('auto')" id="btn-auto" class="phase-btn flex-1 py-2 text-xs font-bold rounded-lg transition-all text-stone-500 hover:bg-stone-50">자동화/심화</button>
                    </div>

                    <div class="h-[800px] overflow-y-auto custom-scrollbar pr-3 space-y-4" id="day-list">
                        <!-- Horizontal cards injected here -->
                    </div>
                </div>

                <!-- Fixed Detail Panel -->
                <div class="xl:w-1/3">
                    <div id="detail-panel" class="bg-white rounded-3xl shadow-xl border border-stone-200 overflow-hidden sticky top-24 flex flex-col fade-in">
                        <div id="detail-header" class="bg-stone-900 p-8 text-white">
                            <span id="detail-tag" class="inline-block bg-teal-600 text-[10px] font-bold px-2 py-0.5 rounded mb-3 tracking-widest uppercase">Phase</span>
                            <h2 id="detail-title" class="text-2xl font-bold leading-tight">강의를 선택해 주세요</h2>
                        </div>
                        <div class="p-8">
                            <div class="mb-8">
                                <h4 class="text-[10px] font-bold text-stone-400 uppercase tracking-widest mb-3">Core Objective</h4>
                                <p id="detail-objective" class="text-stone-800 text-lg font-medium leading-relaxed"></p>
                            </div>
                            <div class="space-y-6">
                                <div>
                                    <h4 class="text-[10px] font-bold text-stone-400 uppercase tracking-widest mb-4">Curriculum Details</h4>
                                    <ul id="detail-items" class="space-y-3"></ul>
                                </div>
                                <div class="p-5 bg-teal-50 rounded-2xl border border-teal-100">
                                    <h5 class="text-[10px] font-bold text-teal-700 mb-2 uppercase">Coach's Insight</h5>
                                    <p id="coach-tip" class="text-sm text-teal-800 italic leading-relaxed"></p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="analytics" class="mb-16 scroll-mt-24">
            <div class="bg-white rounded-3xl p-8 border border-stone-100 shadow-sm">
                <h3 class="text-xl font-bold text-stone-900 mb-8 flex items-center">
                    <span class="w-8 h-8 bg-teal-700 text-white rounded-full flex items-center justify-center text-sm mr-3">📈</span> 16일 교육 역량 로드맵
                </h3>
                <div class="chart-container">
                    <canvas id="growthChart"></canvas>
                </div>
            </div>
        </section>

    </main>

    <footer class="bg-stone-900 text-stone-500 py-12 text-center text-sm">
        <p>&copy; 2026 AI Curriculum Master Program. Designed for Professional Career Growth.</p>
    </footer>

    <script>
        const curriculum = [
            { day: 1, phase: 'found', tag: 'Foundation', title: "생성형 AI의 이해와 업무 패러다임", objective: "생성형 AI의 기술적 배경을 이해하고 AI와 협업하는 마인드셋을 확립한다.", items: ["AI 트렌드와 산업별 변화", "LLM의 작동 원리 이해", "기초 대화 세팅"], tip: "AI를 단순한 도구가 아닌 똑똑한 비서로 대우해 보세요.", memo: "" },
            { day: 2, phase: 'found', tag: 'Foundation', title: "프롬프트 엔지니어링 1: 구조화 기술", objective: "원하는 결과를 즉시 얻기 위한 구조적 프롬프트 작성 공식을 마스터한다.", items: ["역할 부여와 배경 설정", "제약 조건 및 출력 형식 지정", "Zero-shot vs Few-shot 실습"], tip: "질문이 구체적일수록 AI의 답변 수준이 올라갑니다.", memo: "" },
            { day: 3, phase: 'found', tag: 'Foundation', title: "프롬프트 엔지니어링 2: 논리적 추론", objective: "AI가 단계별로 생각하게 하여 복잡한 문제 해결 능력을 향상시킨다.", items: ["Chain-of-Thought 기법", "Self-Consistency 추론", "복합 업무 논리 설계"], tip: "'단계별로 생각해보자'라는 문장을 활용해 보세요.", memo: "" },
            { day: 4, phase: 'found', tag: 'Foundation', title: "텍스트 AI 심화: 문서 요약 및 기획", objective: "방대한 자료를 분석하고 실무 기획안으로 변환하는 능력을 기른다.", items: ["롱폼 문서 분석 및 요약", "비즈니스 기획서 초안 작성", "어조 및 매너 변환"], tip: "AI는 당신의 생각을 정리해주는 최고의 초안 작성자입니다.", memo: "" },
            { day: 5, phase: 'crea', tag: 'Creation', title: "이미지 생성 AI 기초: DALL-E & Midjourney", objective: "텍스트 프롬프트를 시각적 결과물로 변환하는 이미지 생성 기술을 습득한다.", items: ["DALL-E 3 사용법", "이미지 스타일 및 구도 제어", "상업적 이용 가이드라인"], tip: "눈으로 보는 이미지를 말로 상세히 묘사해 보세요.", memo: "" },
            { day: 6, phase: 'crea', tag: 'Creation', title: "이미지 생성 심화: 브랜드 디자인 활용", objective: "로고, UI 디자인, 마케팅 에셋을 일관성 있게 생성하는 기법을 배운다.", items: ["일관성 있는 캐릭터 생성", "로고 및 UI 레이아웃 추출", "이미지 편집 및 확장"], tip: "디자인 시안을 잡을 때 AI를 활용하면 시간이 10배 단축됩니다.", memo: "" },
            { day: 7, phase: 'crea', tag: 'Creation', title: "영상 및 음성 AI: 멀티모달 확장", objective: "텍스트에서 영상과 음성을 생성하여 콘텐츠 제작 범위를 확장한다.", items: ["Runway 영상 생성 실습", "AI 보이스 생성 및 클로닝", "Suno AI 배경음악 제작"], tip: "이제 혼자서도 짧은 광고 영상을 충분히 만들 수 있습니다.", memo: "" },
            { day: 8, phase: 'crea', tag: 'Creation', title: "AI 기반 프레젠테이션 자동화", objective: "아이디어만으로 발표 자료를 자동 구성하고 디자인하는 워크플로우를 완성한다.", items: ["Gamma 슬라이드 자동 생성", "시각적 발표 자료 고도화", "스피치 대본 자동 생성"], tip: "내용 기획에 집중하고 디자인은 AI에게 맡기세요.", memo: "" },
            { day: 9, phase: 'auto', tag: 'Automation', title: "데이터 분석 AI 기초: ChatGPT ADA", objective: "복잡한 엑셀 데이터를 AI에게 맡겨 통계 분석 및 시각화를 수행한다.", items: ["데이터 전처리 자동화", "통계 분석 및 상관관계 도출", "데이터 차트 자동 생성"], tip: "데이터를 업로드하고 질문만 던지면 분석이 시작됩니다.", memo: "" },
            { day: 10, phase: 'auto', tag: 'Automation', title: "엑셀/스프레드시트 AI 연동", objective: "함수와 스크립트 없이 AI 확장 기능을 통해 대량의 데이터를 처리한다.", items: ["GPT for Sheets 연동", "대량 데이터 분류 및 번역", "복잡한 수식 생성 실습"], tip: "반복적인 엑셀 노가다에서 해방될 시간입니다.", memo: "" },
            { day: 11, phase: 'auto', tag: 'Automation', title: "노코드 업무 자동화: Zapier + AI", objective: "서로 다른 앱을 AI로 연결하여 업무 프로세스를 자동화한다.", items: ["Zapier 연동 기초", "이메일 자동 요약 알림 구축", "자동 캘린더 관리 시스템"], tip: "잠자는 동안에도 AI는 당신의 워크플로우를 처리합니다.", memo: "" },
            { day: 12, phase: 'auto', tag: 'Automation', title: "AI 비서 구축: 일정 및 커뮤니케이션", objective: "개인 비서 역할을 하는 AI 시스템을 설계하여 생산성을 극대화한다.", items: ["정보 통합 요약 시스템", "트렌드 리포트 자동 생성", "회의록 자동 추출 및 To-do 생성"], tip: "정보 과잉 시대, AI로 핵심만 요약해서 관리하세요.", memo: "" },
            { day: 13, phase: 'auto', tag: 'Advanced', title: "나만의 맞춤형 GPTs 설계", objective: "특정 업무 지식을 학습시킨 전용 챗봇 에이전트를 만든다.", items: ["Custom GPTs 구성 요소 이해", "지식 베이스 최적화 기법", "에이전트 행동 지침 설정"], tip: "당신의 업무 노하우를 AI 봇에 그대로 녹여내세요.", memo: "" },
            { day: 14, phase: 'auto', tag: 'Advanced', title: "직무별 AI 활용 시나리오 완성", objective: "마케팅, 인사, 재무 등 직무별 최적화된 활용 시나리오를 완성한다.", items: ["페르소나 기반 전략 수립", "채용 및 교육 커리큘럼 설계", "비용 분석 및 개선 제안"], tip: "우리 팀만의 AI 활용 가이드라인을 만들어 보세요.", memo: "" },
            { day: 15, phase: 'auto', tag: 'Advanced', title: "AI 윤리, 보안 및 미래 전략", objective: "안전하게 AI를 사용하기 위한 보안 수칙과 기술 변화 흐름을 이해한다.", items: ["기업 데이터 보안 가이드", "환각 현상 대응 전략", "미래 AI 기술 전망"], tip: "기술을 잘 쓰는 것만큼 보안을 지키는 것도 중요합니다.", memo: "" },
            { day: 16, phase: 'auto', tag: 'Final', title: "종합 프로젝트: AI 워크플로우 발표", objective: "16일간 배운 내용을 종합하여 본인의 업무 개선 결과를 공유한다.", items: ["최종 워크플로우 시연", "동료 피드백 및 코칭", "개인별 학습 로드맵 수료"], tip: "오늘의 수료가 새로운 AI 커리어의 시작입니다.", memo: "" }
        ];

        let currentFilter = 'all';
        let selectedDayId = 1;

        function init() {
            renderDayList();
            selectDay(1);
            initChart();
        }

        function filterPhase(phase) {
            currentFilter = phase;
            document.querySelectorAll('.phase-btn').forEach(b => {
                b.classList.remove('active-tab');
                b.classList.add('text-stone-500');
            });
            document.getElementById(`btn-${phase}`).classList.add('active-tab');
            document.getElementById(`btn-${phase}`).classList.remove('text-stone-500');
            renderDayList();
        }

        function renderDayList() {
            const list = document.getElementById('day-list');
            list.innerHTML = '';
            
            const filtered = curriculum.filter(item => 
                currentFilter === 'all' || item.phase === currentFilter
            );

            filtered.forEach(item => {
                const card = document.createElement('div');
                card.id = `card-${item.day}`;
                card.className = `day-card bg-white border border-stone-200 rounded-3xl overflow-hidden flex flex-col md:flex-row shadow-sm fade-in ${selectedDayId === item.day ? 'selected' : ''}`;
                
                card.onclick = (e) => {
                    if (['BUTTON', 'TEXTAREA'].includes(e.target.tagName)) return;
                    selectDay(item.day);
                };

                card.innerHTML = `
                    <!-- Left: Info -->
                    <div class="p-6 md:w-3/5 border-b md:border-b-0 md:border-r border-stone-100 flex items-start">
                        <div class="flex-shrink-0 w-10 h-10 rounded-xl bg-stone-50 flex items-center justify-center font-bold text-stone-400 mr-4">
                            ${item.day}
                        </div>
                        <div class="flex-grow">
                            <span class="text-[9px] font-bold text-teal-600 uppercase tracking-widest block mb-1">${item.tag}</span>
                            <h3 class="text-base font-bold text-stone-800 leading-tight">${item.title}</h3>
                        </div>
                    </div>
                    
                    <!-- Right: Memo Area -->
                    <div class="p-6 md:w-2/5 bg-stone-50/50 flex flex-col justify-between relative">
                        <div id="memo-display-${item.day}" class="${item.memo ? '' : 'hidden'}">
                            <p class="text-[10px] text-stone-400 font-bold uppercase tracking-tighter mb-1">My Memo</p>
                            <p class="text-xs text-stone-600 leading-relaxed italic line-clamp-2">"${item.memo}"</p>
                        </div>
                        
                        <div id="memo-empty-${item.day}" class="${item.memo ? 'hidden' : ''} flex items-center justify-center h-full">
                            <p class="text-[10px] text-stone-300 font-medium italic">기록된 메모가 없습니다.</p>
                        </div>

                        <div id="memo-edit-box-${item.day}" class="hidden">
                            <textarea id="textarea-${item.day}" class="w-full text-xs p-3 border border-teal-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-500 bg-white" rows="2" placeholder="메모를 입력하세요...">${item.memo}</textarea>
                            <div class="flex space-x-2 mt-2">
                                <button onclick="saveMemo(${item.day})" class="flex-1 bg-teal-700 text-white text-[10px] py-1.5 rounded-lg font-bold">저장</button>
                                <button onclick="toggleEdit(${item.day}, false)" class="flex-1 bg-stone-200 text-stone-600 text-[10px] py-1.5 rounded-lg font-bold">취소</button>
                            </div>
                        </div>

                        <div class="flex justify-end mt-4" id="memo-actions-${item.day}">
                            <button onclick="toggleEdit(${item.day}, true)" class="text-[10px] font-bold text-teal-700 bg-teal-50 px-3 py-1.5 rounded-full hover:bg-teal-100 transition-colors">
                                ${item.memo ? '수정' : '메모 추가'}
                            </button>
                        </div>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function selectDay(dayId) {
            selectedDayId = dayId;
            document.querySelectorAll('.day-card').forEach(c => c.classList.remove('selected'));
            const card = document.getElementById(`card-${dayId}`);
            if (card) card.classList.add('selected');

            const data = curriculum.find(d => d.day === dayId);
            const panel = document.getElementById('detail-panel');
            
            panel.classList.remove('fade-in');
            void panel.offsetWidth;
            panel.classList.add('fade-in');

            document.getElementById('detail-tag').innerText = data.tag;
            document.getElementById('detail-title').innerText = data.title;
            document.getElementById('detail-objective').innerText = data.objective;
            document.getElementById('coach-tip').innerText = data.tip;

            const list = document.getElementById('detail-items');
            list.innerHTML = '';
            data.items.forEach(it => {
                const li = document.createElement('li');
                li.className = 'flex items-start text-sm text-stone-600';
                li.innerHTML = `<span class="text-teal-500 mr-3 mt-1.5 w-1.5 h-1.5 rounded-full bg-teal-500 flex-shrink-0"></span> <span>${it}</span>`;
                list.appendChild(li);
            });
        }

        // Memo Functions
        function toggleEdit(dayId, isEditing) {
            const display = document.getElementById(`memo-display-${dayId}`);
            const empty = document.getElementById(`memo-empty-${dayId}`);
            const editBox = document.getElementById(`memo-edit-box-${dayId}`);
            const actions = document.getElementById(`memo-actions-${dayId}`);

            if (isEditing) {
                display.classList.add('hidden');
                empty.classList.add('hidden');
                editBox.classList.remove('hidden');
                actions.classList.add('hidden');
                document.getElementById(`textarea-${dayId}`).focus();
            } else {
                const data = curriculum.find(d => d.day === dayId);
                if (data.memo) display.classList.remove('hidden'); else empty.classList.remove('hidden');
                editBox.classList.add('hidden');
                actions.classList.remove('hidden');
            }
        }

        function saveMemo(dayId) {
            const val = document.getElementById(`textarea-${dayId}`).value;
            const index = curriculum.findIndex(d => d.day === dayId);
            if (index !== -1) {
                curriculum[index].memo = val;
                renderDayList();
                // 유지 보수를 위해 선택된 상태 복구
                const card = document.getElementById(`card-${dayId}`);
                if (card) card.classList.add('selected');
            }
        }

        function scrollToSection(id) {
            document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
        }

        function initChart() {
            const ctx = document.getElementById('growthChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: curriculum.map(d => `${d.day}일`),
                    datasets: [{
                        label: 'AI 활용 역량 성장도',
                        data: [12, 28, 42, 55, 62, 72, 80, 85, 90, 92, 94, 96, 97, 98, 99, 100],
                        borderColor: '#0d9488',
                        backgroundColor: 'rgba(13, 148, 136, 0.1)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 3,
                        pointBackgroundColor: '#0d9488',
                        pointBorderColor: '#fff',
                        pointHoverRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { display: false, min: 0, max: 110 },
                        x: { grid: { display: false }, ticks: { font: { size: 10, weight: 'bold' }, color: '#a8a29e' } }
                    }
                }
            });
        }

        window.onload = init;
    </script>
</body>
</html>
